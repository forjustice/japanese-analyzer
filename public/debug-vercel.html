<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel环境调试工具</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .section { border: 1px solid #ddd; margin: 20px 0; padding: 15px; border-radius: 8px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .warning { background-color: #fff3cd; border-color: #ffeaa7; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        .log { background-color: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
        button { padding: 10px 20px; margin: 5px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .code-block { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .highlight { background-color: yellow; padding: 2px 4px; border-radius: 2px; }
        .status-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .status-success { background-color: #28a745; }
        .status-error { background-color: #dc3545; }
        .status-warning { background-color: #ffc107; }
    </style>
</head>
<body>
    <h1>🔍 Vercel环境调试工具</h1>
    
    <div class="section info">
        <h2>📊 环境信息检查</h2>
        <button onclick="checkEnvironment()">检查环境</button>
        <div id="environmentResult" class="log" style="display: none;"></div>
    </div>

    <div class="grid">
        <div class="section">
            <h2>📤 1. 发送验证码测试</h2>
            <div class="form-group">
                <label>邮箱:</label>
                <input type="email" id="testEmail" value="test@example.com">
            </div>
            <button onclick="testSendCode()">发送验证码</button>
            <div id="sendCodeResult" class="log" style="display: none;"></div>
        </div>

        <div class="section">
            <h2>🔐 2. 验证码调试</h2>
            <div class="form-group">
                <label>邮箱:</label>
                <input type="email" id="debugEmail" value="test@example.com">
            </div>
            <div class="form-group">
                <label>验证码:</label>
                <input type="text" id="debugCode" placeholder="输入验证码" maxlength="6">
            </div>
            <button onclick="debugVerifyCode()">调试验证码</button>
            <div id="debugResult" class="log" style="display: none;"></div>
        </div>
    </div>

    <div class="section">
        <h2>🧪 3. 完整注册流程测试</h2>
        <div class="form-group">
            <label>邮箱:</label>
            <input type="email" id="regEmail" value="test@example.com">
        </div>
        <div class="form-group">
            <label>密码:</label>
            <input type="password" id="regPassword" value="TestPassword123">
        </div>
        <div class="form-group">
            <label>用户名:</label>
            <input type="text" id="regUsername" value="testuser">
        </div>
        <div class="form-group">
            <label>验证码:</label>
            <input type="text" id="regCode" placeholder="输入验证码" maxlength="6">
        </div>
        <button onclick="testFullRegistration()">完整注册测试</button>
        <div id="fullRegResult" class="log" style="display: none;"></div>
    </div>

    <div class="section">
        <h2>📋 问题诊断报告</h2>
        <div id="diagnosticReport" class="log">点击各个测试按钮收集诊断信息...</div>
    </div>

    <script>
        let diagnosticData = {};

        function log(message, elementId = null) {
            const timestamp = new Date().toISOString();
            const logMessage = `[${timestamp}] ${message}`;
            
            if (elementId) {
                const element = document.getElementById(elementId);
                if (element) {
                    element.style.display = 'block';
                    element.textContent += logMessage + '\n';
                    element.scrollTop = element.scrollHeight;
                }
            }
            
            console.log(logMessage);
        }

        function updateDiagnosticReport() {
            const report = document.getElementById('diagnosticReport');
            const issues = [];
            const suggestions = [];

            // 分析环境数据
            if (diagnosticData.environment) {
                const env = diagnosticData.environment;
                
                if (env.database?.status !== 'connected') {
                    issues.push(`❌ 数据库连接失败: ${env.database?.error?.message || '未知错误'}`);
                    suggestions.push("检查Vercel环境变量中的数据库配置");
                }

                if (env.timeTest?.mysqlNow?.error) {
                    issues.push(`❌ MySQL时间查询失败: ${env.timeTest.mysqlNow.error}`);
                    suggestions.push("检查数据库权限和连接稳定性");
                }

                const jsTime = new Date(env.timeTest?.jsDate);
                const mysqlTime = new Date(env.timeTest?.mysqlNow?.current_time);
                if (Math.abs(jsTime.getTime() - mysqlTime.getTime()) > 60000) {
                    issues.push(`⚠️ 时间不同步: JS时间和MySQL时间差异超过1分钟`);
                    suggestions.push("检查服务器时区设置");
                }
            }

            // 分析验证码数据
            if (diagnosticData.verifyCode) {
                const vc = diagnosticData.verifyCode;
                
                if (!vc.codeFormatCheck?.is6Digits) {
                    issues.push(`❌ 验证码格式错误: 不是6位数字`);
                }

                if (vc.databaseResults?.exactMatch?.length === 0) {
                    issues.push(`❌ 数据库中未找到匹配的验证码`);
                    suggestions.push("检查验证码是否正确创建和存储");
                }

                if (vc.databaseResults?.validCodes?.length === 0 && vc.databaseResults?.exactMatch?.length > 0) {
                    const exactCode = vc.databaseResults.exactMatch[0];
                    if (exactCode.is_used) {
                        issues.push(`❌ 验证码已被使用`);
                        suggestions.push("验证码只能使用一次，请获取新的验证码");
                    }
                    if (!exactCode.is_not_expired) {
                        issues.push(`❌ 验证码已过期`);
                        suggestions.push("验证码有效期15分钟，请获取新的验证码");
                    }
                }
            }

            let reportHtml = '<h3>🔍 诊断结果</h3>';
            
            if (issues.length === 0) {
                reportHtml += '<div class="success">✅ 未发现明显问题</div>';
            } else {
                reportHtml += '<div class="error"><h4>发现的问题:</h4>';
                issues.forEach(issue => reportHtml += `<div>${issue}</div>`);
                reportHtml += '</div>';
            }

            if (suggestions.length > 0) {
                reportHtml += '<div class="info"><h4>建议:</h4>';
                suggestions.forEach(suggestion => reportHtml += `<div>• ${suggestion}</div>`);
                reportHtml += '</div>';
            }

            reportHtml += '<h4>完整数据:</h4>';
            reportHtml += `<div class="code-block">${JSON.stringify(diagnosticData, null, 2)}</div>`;

            report.innerHTML = reportHtml;
        }

        async function checkEnvironment() {
            log('🔍 检查环境信息...', 'environmentResult');
            
            try {
                const response = await fetch('/api/debug/environment');
                const data = await response.json();
                
                diagnosticData.environment = data.data;
                
                log(`📊 环境检查完成`, 'environmentResult');
                log(`Node环境: ${data.data.environment.nodeEnv}`, 'environmentResult');
                log(`Vercel环境: ${data.data.environment.vercel.env}`, 'environmentResult');
                log(`时区: ${data.data.environment.timezone}`, 'environmentResult');
                log(`数据库状态: ${data.data.database.status}`, 'environmentResult');
                
                if (data.data.database.error) {
                    log(`❌ 数据库错误: ${data.data.database.error.message}`, 'environmentResult');
                }
                
                log(JSON.stringify(data.data, null, 2), 'environmentResult');
                
                updateDiagnosticReport();
                
            } catch (error) {
                log(`❌ 环境检查失败: ${error.message}`, 'environmentResult');
                console.error('环境检查错误:', error);
            }
        }

        async function testSendCode() {
            const email = document.getElementById('testEmail').value;
            log(`🚀 测试发送验证码: ${email}`, 'sendCodeResult');
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                log(`📨 响应状态: ${response.status}`, 'sendCodeResult');
                log(`📨 响应数据: ${JSON.stringify(data, null, 2)}`, 'sendCodeResult');
                
                if (data.success && data.data?.code) {
                    document.getElementById('debugCode').value = data.data.code;
                    document.getElementById('regCode').value = data.data.code;
                    log(`✅ 验证码已自动填入: ${data.data.code}`, 'sendCodeResult');
                }
                
            } catch (error) {
                log(`❌ 发送验证码失败: ${error.message}`, 'sendCodeResult');
                console.error('发送验证码错误:', error);
            }
        }

        async function debugVerifyCode() {
            const email = document.getElementById('debugEmail').value;
            const code = document.getElementById('debugCode').value;
            
            log(`🔍 调试验证码: ${email} - ${code}`, 'debugResult');
            
            try {
                const response = await fetch('/api/debug/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, type: 'registration' })
                });
                
                const data = await response.json();
                
                diagnosticData.verifyCode = data.data;
                
                log(`📊 验证码调试完成`, 'debugResult');
                log(JSON.stringify(data.data, null, 2), 'debugResult');
                
                updateDiagnosticReport();
                
            } catch (error) {
                log(`❌ 验证码调试失败: ${error.message}`, 'debugResult');
                console.error('验证码调试错误:', error);
            }
        }

        async function testFullRegistration() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const username = document.getElementById('regUsername').value;
            const code = document.getElementById('regCode').value;
            
            log(`🧪 完整注册测试: ${email}`, 'fullRegResult');
            
            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code, password, username, type: 'registration' })
                });
                
                const data = await response.json();
                
                log(`📨 注册响应状态: ${response.status}`, 'fullRegResult');
                log(`📨 注册响应数据: ${JSON.stringify(data, null, 2)}`, 'fullRegResult');
                
                if (data.success) {
                    log(`✅ 注册成功!`, 'fullRegResult');
                } else {
                    log(`❌ 注册失败: ${data.message}`, 'fullRegResult');
                }
                
            } catch (error) {
                log(`❌ 注册测试失败: ${error.message}`, 'fullRegResult');
                console.error('注册测试错误:', error);
            }
        }

        // 页面加载时自动检查环境
        window.addEventListener('load', () => {
            log('🔍 Vercel环境调试工具已加载');
            checkEnvironment();
        });
    </script>
</body>
</html>
